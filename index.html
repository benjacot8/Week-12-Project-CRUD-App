<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 12 Project</title>
    
    <!--Link to CSS and JS-->
    <link rel="stylesheet" href="styles.css">
    <script src="crud app.js"></script>

</head>
<body>

    <h1>Week 12 Project: Create, Read, Update, Delete App</h1>

    <!-- Description of the app -->
    <p>This is a simple CRUD app for managing a grocery list.</p>

    <!-- Image of fruits -->
    <img src="fruits.jpg" alt="Fruits" width="400" height="400">

    <!-- Grocery list table with items and quantities -->
    <h3>Grocery List</h3>
    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Apples</td>
                <td>5</td>
            </tr>
            <tr>
                <td>Bananas</td>
                <td>6</td>
            </tr>
            <tr>
                <td>Oranges</td>
                <td>7</td>
            </tr>
        </tbody>
    </table>

    <!-- Form for adding new items -->
    <h3>Add New Item</h3>
    <!-- Create Form -->
    <form id="shoppingForm" class="mb-4">
      <div class="input-group">
        Grocery Item Name:
        <input
          type="text"
          id="title"
          class="form-control"
          placeholder="Enter item name"
          required
        />
        Quantity:
        <input
          type="number"
          id="quantity"
          class="form-control"
          placeholder="Enter quantity"
          required
        />
        <button class="btn btn-primary">Add item</button>
      </div>
    </form>

    <!-- Shopping List -->
    <h3>Shopping List</h3>
    <ul id="shoppingList">
    </ul>

</body>
</html>
